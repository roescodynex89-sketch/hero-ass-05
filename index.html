<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- font add -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind add -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Home GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/Aperture.png" type="image/x-icon" />
    <link rel="stylesheet" href="issues.css">

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>



    <section
      class="max-w-[520px] min-h-[700px] mx-auto bg-[#FFFFFF] border-lime-100 mt-8"
    >


    <!-- navbar+icon -->
      <div class="icon">
        <div class="img w-[100px] h-[100px] flex items-center mx-auto">
          <img src="assets/github-logo.png" alt="" />
        </div>

        <div class="flex flex-col items-center text-center mx-auto mt-4">
          <h1 class="text-[24px] font-semibold text-[#002C5C]">
            GitHub Issues Tracker
          </h1>
          <p class="text-[17px] font-semibold text-[#64748B]">
            Sign in to manage your issues
          </p>
        </div>
      </div>
<!-- this is a input form -->
      <div class="mt-8 px-10">
        <div class="mb-4 text-left">
          <label class="block text-[16px] font-semibold text-[#002C5C] mb-1"
            >Username</label
          >
          <input
            type="text"
            id="username"
            placeholder="Enter Username"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg"
          />
          <p class="text-[14px] text-[#5C5CFF] mt-1">Default: admin</p>
        </div>

        <div class="mb-6 text-left">
          <label class="block text-[16px] font-semibold text-[#002C5C] mb-1"
            >Password</label
          >
          <input
            type="password"
            id="password"
            placeholder="Enter Password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg"
          />
          <p class="text-[14px] text-[#5C5CFF] mt-1">Default: admin123</p>
        </div>
      </div>
<!-- sign btn -->
      <div class="px-10 pb-10">
        <button
          id="login-btn"
          class="w-full bg-[#5C5CFF] text-white font-bold py-3 rounded-xl hover:bg-blue-600 transition duration-300"
        >
          Sign In
        </button>
      </div>
<!-- .........or........ -->
      <div class="flex items-center mt-1 w-full max-w-[456px] mx-auto h-[21px]">
        <div class="flex-1 border-t border-gray-300"></div>

        <span class="mx-4 text-[#002C5C] text-1xl font-semibold"> OR </span>

        <div class="flex-1 border-t border-gray-300"></div>
      </div>
<!-- demoooooo add -->
      <div class="mt-4 text-center flex flex-col items-center justify-center">
        <p class="text-[14px] text-[#64748B]">Demo Credentials:</p>
        <div class="mt-2">
          <p class="text-[16px] font-bold text-[#1F2937]">
            Username: <span class="font-normal">admin</span>
          </p>
          <p class="text-[16px] font-bold text-[#1F2937]">
            Password: <span class="font-normal">admin123</span>
          </p>
        </div>
      </div>
      
    </section>

    <script src="script/login.js"></script>
  </body>
</html>
