<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- font add -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind add -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-icon-add -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>DASH GitHub Issues</title>
    <link rel="shortcut icon" href="assets/Aperture.png" type="image/x-icon" />
    <link rel="stylesheet" href="issues.css" />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- Nav -->
    <nav
      class="flex justify-between items-center bg-white shadow p-4 border-b border-gray-200"
    >
      <!--icon+h1 tag-->
      <div class="flex items-center gap-2">
        <img class="w-6 h-6" src="assets/github-logo.png" alt="GitHub Logo" />
        <h1 class="text-xl font-semibold text-gray-900">
          GitHub Issues Tracker
        </h1>
      </div>
      <!-- search+btn -->
      <div class="flex items-center gap-3">
        <div class="relative flex items-center">
          <i class="fa-solid fa-magnifying-glass absolute left-3"></i>

          <input
            id="search-input"
            type="text"
            placeholder="Search issues..."
            class="pl-10 pr-4 py-2 border border-gray-300 rounded-md bg-gray-50 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 w-56"
          />
        </div>
        <!-- search>js lagbe-->
        <button
          onclick="searchIssue()"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-md"
        >
          Search
        </button>
      </div>
    </nav>

    <!-- all/open/close -->

    <div class="max-w-[1100px] mx-auto mt-4 px-4">
      <div
        class="bg-white shadow rounded-lg px-4 py-3 mb-4 flex items-center gap-2"
      >
        <button
          id="all-btn"
          onclick="switchTab('all')"
          class="px-5 py-2 rounded-md text-sm font-semibold bg-blue-600 text-white transition-all"
        >
          All
        </button>
        <button
          id="open-btn"
          onclick="switchTab('open')"
          class="px-5 py-2 rounded-md text-sm font-semibold border border-gray-300 text-gray-700 hover:bg-gray-100 transition-all"
        >
          Open
        </button>
        <button
          id="closed-btn"
          onclick="switchTab('closed')"
          class="px-5 py-2 rounded-md text-sm font-semibold border border-gray-300 text-gray-700 hover:bg-gray-100 transition-all"
        >
          Closed
        </button>
      </div>
      <!--issue bar  -->
      <div
        class="bg-white shadow rounded-t-lg px-5 py-4 flex items-center justify-between border-b border-gray-100"
      >
        <div class="flex items-center gap-3">
          <img src="assets/Aperture.png" alt="issues" class="w-10 h-10 p-1" />
          <div>
            <h2 class="text-base font-bold text-gray-900">
              <span id="issue-count">50</span> Issues
            </h2>
            <p class="text-xs text-gray-400">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <div class="flex items-center gap-4 text-sm font-medium">
          <span class="flex items-center gap-1">
            <span
              class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"
            ></span>
            <span class="text-gray-700">Open</span>
          </span>
          <span class="flex items-center gap-1">
            <span
              class="w-2.5 h-2.5 rounded-full bg-purple-600 inline-block"
            ></span>
            <span class="text-gray-700">Closed</span>
          </span>
        </div>
      </div>

      <div class="bg-white shadow rounded-b-lg p-5">

        <!-- chanlenge part-->
        <div
          id="loading"
          class="flex flex-col items-center justify-center py-16 gap-3"
        >
          <div
            class="w-8 h-8 border-4 border-gray-200 border-t-blue-500 rounded-full animate-spin"
          ></div>
          <span class="text-sm text-gray-400">Loading issues...</span>
        </div>

        <!-- loding -->
        <div id="empty-state" class="hidden text-center py-16">
          <p class="text-gray-400 text-sm">No issues found.</p>
        </div>

        
        <div
          id="issues-container"
          class="hidden grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"
        ></div>
      </div>
    </div>
<!-- card>js update hbe -->
    <div
      id="issue-modal"
      class="hidden fixed inset-0 items-center justify-center z-50 p-4"
    >
      <div
        class="bg-white p-8 rounded-xl w-full max-w-[550px] shadow-2xl relative"
      >
        <h2 id="modal-title" class="text-2xl font-bold mb-3 text-gray-900"></h2>

        <div
          class="flex items-center gap-2 text-sm text-gray-500 mb-5 pb-4 border-b"
        >
          <span
            id="modal-status"
            class="px-2.5 py-1 rounded-full text-white font-semibold text-xs uppercase"
          ></span>
          <span
            >• Opened by
            <span id="modal-author" class="font-bold text-gray-700"></span
          ></span>
          <span>•</span>
          <span id="modal-date"></span>
        </div>

        <div id="modal-labels" class="flex gap-2 mb-5"></div>

        <div class="mb-6">
          <p id="modal-desc" class="text-gray-600 leading-relaxed"></p>
        </div>

        <div class="grid grid-cols-2 gap-10 mb-8 text-sm text-gray-700">
          <p><strong>Assignee:</strong> <span id="modal-assignee"></span></p>
          <p><strong>Priority:</strong> <span id="modal-priority"></span></p>
        </div>

        <div class="flex justify-end">
          <button
            onclick="closeModal()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition-colors"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <script src="script/main.js"></script>
  </body>
</html>
